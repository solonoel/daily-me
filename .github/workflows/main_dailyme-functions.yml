name: Build and deploy Node.js project to Azure Function App - dailyme-functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install dependencies
        working-directory: api
        run: npm install --production

      - name: Deploy via zip deploy
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          USERNAME=$(echo "$PUBLISH_PROFILE" | grep -o 'userName="[^"]*"' | head -1 | cut -d'"' -f2)
          PASSWORD=$(echo "$PUBLISH_PROFILE" | grep -o 'userPWD="[^"]*"' | head -1 | cut -d'"' -f2)

          cd api
          zip -r ../deploy.zip . --exclude "*.git*" --exclude "local.settings.json"
          cd ..

          curl -X POST \
            "https://dailyme-functions-ewhcg5akbxhhcugr.scm.centralus-01.azurewebsites.net/api/zipdeploy" \
            -u "$USERNAME:$PASSWORD" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            -w "\nHTTP Status: %{http_code}\n"
