name: Build and deploy Node.js project to Azure Function App - dailyme-functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install dependencies
        working-directory: api
        run: npm install --production

      - name: Deploy files via Kudu VFS
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          USERNAME=$(echo "$PUBLISH_PROFILE" | grep -o 'userName="[^"]*"' | head -1 | cut -d'"' -f2)
          PASSWORD=$(echo "$PUBLISH_PROFILE" | grep -o 'userPWD="[^"]*"' | head -1 | cut -d'"' -f2)
          
          for file in api/*/index.js api/*/function.json; do
            FUNCPATH=${file#api/}
            echo "Uploading $file to $FUNCPATH"
            curl -X PUT \
              "https://dailyme-functions-ewhcg5akbxhhcugr.scm.centralus-01.azurewebsites.net/api/vfs/site/wwwroot/$FUNCPATH" \
              -u "$USERNAME:$PASSWORD" \
              -H "Content-Type: application/octet-stream" \
              -H "If-Match: *" \
              --data-binary @$file \
              -w "\nHTTP Status: %{http_code}\n"
          done

          echo "Uploading package.json"
          curl -X PUT \
            "https://dailyme-functions-ewhcg5akbxhhcugr.scm.centralus-01.azurewebsites.net/api/vfs/site/wwwroot/package.json" \
            -u "$USERNAME:$PASSWORD" \
            -H "Content-Type: application/octet-stream" \
            -H "If-Match: *" \
            --data-binary @api/package.json \
            -w "\nHTTP Status: %{http_code}\n"